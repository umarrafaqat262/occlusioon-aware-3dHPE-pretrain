model_name: AnatomyProj-Mamba_V2

# Skeleton
num_joints: 17
num_bones: 16
num_frames: 243

# Model dims — state_dim must equal joint_embed_dim + bone_embed_dim.
joint_embed_dim: 48
bone_embed_dim: 48
state_dim: 96
num_heads: 4
num_blocks: 4
ssm_expand: 1
mlp_ratio: 2
fk_hidden: 160
dropout: 0.2          # B2: 0.1 -> 0.2 (regularize the 16mm train->test gap)
d_state: 24

# V2 — multi-scale global-local temporal (A1) + global body token (A2)
temporal_scales: [1, 3]   # full-res local + pooled-by-3 global branch
temporal_fuse: gate       # gate | sum
d_state_coarse: 16        # coarse branch state (slimmer than local)
share_coarse: true        # one coarse BiSSM shared across all blocks
coarse_conf_pool: avg     # avg | min  (min preserves novelty B harder under occlusion)
coarse_upsample: linear   # linear | nearest
body_token: true          # per-frame whole-body context injection

# Decoder — Differentiable Anatomical Projection (novelty A). 'fk' = ablation.
decoder: dap
dap_iter: 8
dap_rho: 5.0
dap_step: 0.05
dap_w_floor: 0.1

# Data — VideoPose3D convention, CPN fine-tuned 2D detections, camera-space mm
dataset: vp3d
data_dir: data/motion3d/cpn_vp3d
keypoints_file: data_2d_h36m_cpn_ft_h36m_dbb.npz
dt_file: data_2d_h36m_cpn_ft_h36m_dbb.npz
train_stride: 81
val_fraction: 0.05

# Training (seq2seq, PoseMamba/SasMamba-style)
batch_size: 32
lr: 0.0005
weight_decay: 0.05    # B2: 0.01 -> 0.05
lr_sched: cosine
lr_min_ratio: 0.01
lr_decay: 0.99
warmup_epochs: 5
epochs: 120
clip_grad: 1.0
use_amp: true
ema_decay: 0.999

# Loss weights (3D in metres; MPJPE reported ×1000 = mm)
lambda_bone: 0.0
lambda_sym: 0.1
lambda_reproj: 0.0
lambda_vel: 2.0
lambda_temp: 0.5
lambda_blen: 2.0      # GT bone-length supervision (already targets the scale gap)
lambda_p0: 0.1

# Augmentation — B1: lighter occlusion aug for the clean run; B3: corrected rotation
aug_joint_mask_min: 0.0
aug_joint_mask_max: 0.1     # B1: 0.3 -> 0.1
aug_edge_dropout: 0.05      # B1: 0.1 -> 0.05
aug_edge_max_span: 20
flip_prob: 0.5
rotation_aug: true          # B3: now geometrically consistent (2D + 3D camera-roll)
rotation_max_deg: 20
jitter_aug: true
jitter_scale: 0.05
jitter_shift: 0.05
jitter_noise: 0.01

# Protocol
select_on_test: true   # train on all 5 subjects, best-on-test (SOTA convention)

# Pretraining (MPM)
mpm_epochs: 25
mpm_lr: 0.001
mpm_mask_joint_ratio: 0.2
mpm_mask_frame_ratio: 0.1
