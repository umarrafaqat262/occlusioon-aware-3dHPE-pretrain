model_name: CSM-Pose_BASE

# ── Backbone-only baseline for the incremental ablation ──────────────────────
# Same efficient backbone as csm_s (D=64, 6 blocks, expand=2) but ALL new modules
# OFF. Run this FIRST — it must train STABLY (target ~44-48mm test). Then enable
# one module at a time (see GUIDE_CSM.md) to attribute each module's mm delta and
# find any that destabilizes. Stabilized hyperparameters (lr 2e-4 / warmup 10 /
# clip 0.5) after the 5e-4 all-modules divergence.

# Skeleton
num_joints: 17
num_bones: 16
num_frames: 243

# Backbone
joint_embed_dim: 32
bone_embed_dim: 32
state_dim: 64
num_heads: 4
num_blocks: 6
ssm_expand: 2
mlp_ratio: 2
fk_hidden: 128
dropout: 0.1
d_state: 16

# Decoder — light DAP
decoder: dap
dap_iter: 2
dap_rho: 5.0
dap_step: 0.05
dap_w_floor: 0.1

# ── ALL new modules OFF (baseline) ───────────────────────────────────────────
use_dct: false
spatial_kpa: false
spatial_lap_pe: 0
spatial_limb_reorder: false
spatial_ssi: false
spatial_conf_gate: false
temporal_motion: false
use_infill: false

# Data
dataset: vp3d
data_dir: data/motion3d/cpn_vp3d
keypoints_file: data_2d_h36m_cpn_ft_h36m_dbb.npz
dt_file: data_2d_h36m_cpn_ft_h36m_dbb.npz
train_stride: 81
val_fraction: 0.05

# Training — stabilized
batch_size: 32
lr: 0.0002
weight_decay: 0.01
lr_sched: cosine
lr_min_ratio: 0.01
warmup_epochs: 10
epochs: 120
clip_grad: 0.5
use_amp: true
ema_decay: 0.999
select_on_test: true

# Loss — strong motion/velocity
lambda_sym: 0.1
lambda_vel: 20.0
lambda_temp: 0.5
lambda_blen: 2.0
lambda_p0: 0.1

# Augmentation — light (regularizer; clean-first)
aug_joint_mask_min: 0.0
aug_joint_mask_max: 0.1
aug_edge_dropout: 0.05
aug_edge_max_span: 20
aug_structured_occ: false
flip_prob: 0.5
rotation_aug: true
rotation_max_deg: 20
jitter_aug: true
jitter_scale: 0.05
jitter_shift: 0.05
jitter_noise: 0.01

# Pretraining (MPM)
mpm_epochs: 25
mpm_lr: 0.001
mpm_mask_joint_ratio: 0.2
mpm_mask_frame_ratio: 0.1
mpm_noise_std: 0.0
