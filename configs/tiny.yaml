model_name: BoneStateMamba_Tiny

# Skeleton
num_joints: 17
num_bones: 16
num_frames: 243

# Model dims — state_dim must equal joint_embed_dim + bone_embed_dim
joint_embed_dim: 52
bone_embed_dim: 52
state_dim: 104
num_heads: 4
num_blocks: 3
ssm_expand: 2
mlp_ratio: 2
fk_hidden: 160
dropout: 0.1

# Data — checkpoint was trained on Stacked Hourglass detections
data_dir: data/motion3d
dt_file: h36m_sh_conf_cam_source_final.pkl

# Training
batch_size: 48
lr: 0.0005
weight_decay: 0.01
warmup_epochs: 5
epochs: 60
clip_grad: 1.0

# Loss weights
lambda_bone: 0.5
lambda_sym: 0.2
lambda_reproj: 0.1

# Augmentation
aug_joint_mask_min: 0.05
aug_joint_mask_max: 0.5
aug_edge_dropout: 0.15
aug_edge_max_span: 20
flip_prob: 0.5
rotation_aug: true
rotation_max_deg: 30

# Pretraining
mpm_epochs: 30
mpm_lr: 0.001
mpm_mask_joint_ratio: 0.2
mpm_mask_frame_ratio: 0.1
